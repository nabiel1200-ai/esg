name: ESG Alpha Daily Scraper
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install R packages
        run: |
          Rscript -e "
            options(repos = c(CRAN = 'https://cran.r-project.org'))
            if (!require('httr'))      install.packages('httr')
            if (!require('jsonlite'))  install.packages('jsonlite')
            if (!require('dplyr'))     install.packages('dplyr')
            if (!require('xml2'))      install.packages('xml2')
            if (!require('quantmod'))  install.packages('quantmod')
            library(httr); library(jsonlite); library(dplyr); library(xml2); library(quantmod)
            cat('Packages OK\n')
          "

      - name: Run AI agent
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          Rscript scripts/02_ai_agent.R

      - name: Run koersen
        run: |
          Rscript scripts/03_koersen.R

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events_detected.csv || true
          git add data/signals_live.csv || true
          git diff --staged --quiet || git commit -m "Daily ESG update $(date)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
