name: ESG Alpha Daily Scraper

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "
            options(repos = c(CRAN = 'https://cran.r-project.org'))
            if (!require('httr'))      install.packages('httr')
            if (!require('jsonlite'))  install.packages('jsonlite')
            if (!require('dplyr'))     install.packages('dplyr')
            if (!require('xml2'))      install.packages('xml2')
            if (!require('quantmod'))  install.packages('quantmod')
            library(httr); library(jsonlite); library(dplyr); library(xml2); library(quantmod)
            cat('Packages OK\n')
          "

      - name: Run AI agent
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          CURRENTS_KEY: ${{ secrets.CURRENTS_KEY }}
        run: |
          Rscript scripts/02_ai_agent.R

      - name: Run koersen
        run: |
          Rscript scripts/03_koersen.R

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events_detected.csv
          git add data/signals_live.csv || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily ESG update $(date)"
          git push
