name: ESG Alpha Daily Scraper

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('httr', 'jsonlite', 'dplyr'), repos='https://cran.r-project.org', dependencies=TRUE)"

      - name: Verify packages
        run: |
          Rscript -e "library(httr); library(jsonlite); library(dplyr); cat('Packages OK\n')"

      - name: Run AI agent
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          CURRENTS_KEY: ${{ secrets.CURRENTS_KEY }}
        run: |
          Rscript scripts/02_ai_agent.R

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events_detected.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily ESG update $(date)"
          git push
